<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SnapFix — Book a Home Service in a Snap</title>
    <meta name="description" content="SnapFix connects you with verified home service professionals across India — plumbers, electricians, carpenters, painters and more. Book in 2 minutes. Confirmed within 30 minutes." />
    <meta name="keywords" content="home services India, plumber near me, electrician near me, carpenter near me, home repair, SnapFix, AC repair, home cleaning, book handyman, plumber Indore, electrician Mumbai, carpenter Delhi, home services Bangalore, AC service Hyderabad" />
    <meta name="author" content="SnapFix" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://snapfix.pro/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://snapfix.pro/" />
    <meta property="og:title" content="SnapFix — Book a Fix in a Snap" />
    <meta property="og:description" content="Verified home service professionals across India. Dispatched to your door in hours. Fair prices, real reviews, satisfaction guaranteed." />
    <meta property="og:image" content="https://snapfix.pro/opengraph.jpg" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="SnapFix" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@snapfixpro" />
    <meta name="twitter:title" content="SnapFix — Book a Home Service in a Snap" />
    <meta name="twitter:description" content="Verified plumbers, electricians, carpenters & more across India. Book in 2 minutes." />
    <meta name="twitter:image" content="https://snapfix.pro/opengraph.jpg" />

    <!-- Structured Data: Organization + LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "HomeAndConstructionBusiness"],
      "name": "SnapFix",
      "alternateName": "SnapFix India",
      "description": "India's fastest home services marketplace connecting residents with verified local professionals.",
      "url": "https://snapfix.pro",
      "logo": {
        "@type": "ImageObject",
        "url": "https://snapfix.pro/favicon.svg",
        "width": 512,
        "height": 512
      },
      "image": "https://snapfix.pro/opengraph.jpg",
      "telephone": "+91-77777-77777",
      "email": "hello@snapfix.pro",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "areaServed": [
        { "@type": "City", "name": "Indore" },
        { "@type": "City", "name": "Bhopal" },
        { "@type": "City", "name": "Jaipur" },
        { "@type": "City", "name": "Lucknow" },
        { "@type": "City", "name": "Nagpur" },
        { "@type": "City", "name": "Mumbai" },
        { "@type": "City", "name": "Pune" },
        { "@type": "City", "name": "Delhi" },
        { "@type": "City", "name": "Bangalore" },
        { "@type": "City", "name": "Hyderabad" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Home Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Plumbing Services", "description": "Tap repair, pipe fitting, leak fixing, bathroom installation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Electrical Services", "description": "Wiring, switchboard repair, fan installation, MCB repair" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Carpentry Services", "description": "Furniture repair, door fixing, cabinet work, custom woodwork" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Painting Services", "description": "Wall painting, waterproofing, texture work, POP work" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AC Service & Repair", "description": "AC repair, gas refill, installation, deep cleaning" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Home Deep Cleaning", "description": "Deep cleaning, sofa cleaning, kitchen cleaning, bathroom cleaning" } }
        ]
      },
      "priceRange": "₹₹",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "5000",
        "bestRating": "5",
        "worstRating": "1"
      }
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SnapFix",
      "url": "https://snapfix.pro",
      "description": "Book verified home service professionals across India in minutes.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://snapfix.pro/book?service={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does SnapFix work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It takes three steps: (1) Pick a service and tell us your location and preferred time. (2) We match you with a nearby verified professional. (3) The pro visits your home, completes the work, and you pay only when satisfied — cash on completion."
          }
        },
        {
          "@type": "Question",
          "name": "Are SnapFix professionals background-verified?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Every SnapFix professional goes through identity verification, skill assessment, and reference checks before being listed. We also track ratings from every completed job so quality stays high."
          }
        },
        {
          "@type": "Question",
          "name": "Which cities does SnapFix serve?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SnapFix currently serves 10 cities across India: Indore, Bhopal, Jaipur, Lucknow, Nagpur, Mumbai, Pune, Delhi, Bangalore, and Hyderabad. We're expanding rapidly, so check back if your city isn't listed yet."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a home service cost on SnapFix?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit charges start at ₹100–₹200 and the final cost depends on the work needed. You get a clear estimate before any work begins — no hidden charges. You only pay after the job is done and you're satisfied."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can I get a professional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most bookings are confirmed within 30 minutes and same-day visits are available in all our cities. For urgent issues like leaks or electrical faults, our team prioritizes your request."
          }
        },
        {
          "@type": "Question",
          "name": "How do I pay for the service?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Payment is cash on completion — you pay the professional directly after the job is done and you're happy with the work. There are no upfront charges or platform fees."
          }
        },
        {
          "@type": "Question",
          "name": "What if I'm not satisfied with the work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "If you're not satisfied, call or WhatsApp us immediately. We'll either send the same professional back at no charge or dispatch a replacement. Our goal is that you never pay for work you're unhappy with."
          }
        },
        {
          "@type": "Question",
          "name": "How can I become a SnapFix professional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit snapfix.pro/join to apply. You'll need a phone number, a photo, and details of your skills and experience. Our team reviews applications and verified professionals start getting job requests within a few days."
          }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
