services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/sql_app.db
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in .env}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?set ADMIN_USERNAME in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      - UPLOAD_DIR=/app/uploads

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
  backend_db:
