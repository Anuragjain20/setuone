kind = "web"
previewPath = "/"
title = "SevaSetu"
version = "1.0.0"
id = "artifacts/sevasetu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21614

[services.development]
run = "pnpm --filter @workspace/sevasetu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sevasetu", "run", "build" ]
publicDir = "artifacts/sevasetu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21614"
BASE_PATH = "/"
